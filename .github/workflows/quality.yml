name: Content Quality Checks

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install tools
      - name: Install tools
        run: |
          npm install -g markdownlint-cli cspell

      # Markdown lint
      - name: Run markdownlint
        run: markdownlint '**/*.md'

      # Spell check
      - name: Run spell check
        run: cspell "**/*.md"